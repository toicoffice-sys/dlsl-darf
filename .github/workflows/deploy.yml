name: Deploy to Google Apps Script

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Write clasp credentials
        run: |
          echo '${{ secrets.CLASPRC_JSON }}' > ~/.clasprc.json
          echo '${{ secrets.CLASP_JSON }}' > .clasp.json

      - name: Push to Google Apps Script
        run: clasp push --force

      - name: Deploy
        run: |
          clasp deploy \
            --deploymentId "${{ secrets.DEPLOYMENT_ID }}" \
            --description "Auto-deploy from GitHub — ${{ github.event.head_commit.message }}"
